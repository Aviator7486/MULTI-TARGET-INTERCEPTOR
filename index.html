<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fighter Jet • Missile Intercept Simulator V1.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            background: #05070f;
            color: #fff;
            font-family: 'Segoe UI', system_ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh; /* Fixes iOS Safari address bar navigation jumps */
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        h1 {
            margin: 10px 0 2px;
            font-size: 16px;
            letter-spacing: 2px;
            color: #00ff9d;
            text-align: center;
        }

        .subtitle {
            font-size: 9px;
            color: #5a6b7c;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
        }

        /* Default Layout: Tailored for Desktop & Mobile Portrait */
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 100vw;
            padding: 0 10px;
            box-sizing: border-box;
        }

        #left-controls, #right-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.12);
            border: 2px solid #1a2638;
            border-radius: 4px;
            max-width: 100%;
            width: 100%;
            background: #050811;
            box-sizing: border-box;
        }

        canvas {
            display: block;
            border-radius: 2px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 800 / 520;
        }

        .touch-button {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.15);
            border: 2.5px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none; /* Block iOS touch callout selection boxes */
            -webkit-touch-callout: none;
            touch-action: none;
            z-index: 100;
        }

        .touch-button:active {
            background: rgba(0, 255, 157, 0.45);
            color: white;
        }

        .touch-button.fire {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .touch-button.fire:active {
            background: rgba(255, 77, 77, 0.55);
        }

        #joystick-container {
            position: relative;
            width: 90px;
            height: 90px;
            touch-action: none;
            -webkit-user-select: none;
            z-index: 100;
        }

        #joystick-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.1);
            border: 2.5px solid #00ff9d;
            box-sizing: border-box;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 34px;
            height: 34px;
            margin-left: -17px;
            margin-top: -17px;
            border-radius: 50%;
            background: #00ff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.6);
            pointer-events: none;
        }

        #ui-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .ui-box {
            background: rgba(5, 8, 17, 0.92);
            padding: 4px 10px;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        #integrity-bar {
            position: absolute;
            top: 42px;
            left: 8px;
            width: 95px;
            height: 11px;
            background: #1a2638;
            border: 1px solid #00ff9d;
            border-radius: 2px;
            overflow: hidden;
            z-index: 20;
        }

        #integrity-fill {
            height: 100%;
            background: linear-gradient(to right, #ff4d4d, #ffaa00);
            transition: width 0.2s ease;
        }

        #controls-tip {
            margin-top: 8px;
            text-align: center;
            color: #7a8a9e;
            font-size: 11px;
            max-width: 95vw;
            padding: 0 10px;
        }

        .instructions {
            font-size: 10px;
            background: #0a0f1a;
            border: 1px solid #22334a;
            padding: 5px 10px;
            border-radius: 4px;
            margin: 6px 0;
            color: #8fa0b5;
            text-align: center;
            max-width: 95vw;
        }

        /* ==================== CRITICAL SMARTPHONE LANDSCAPE OVERRIDES ==================== */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 4px 0;
            }
            /* Hide static headers/text blocks to claim maximum view real estate for controls and gameplay */
            h1, .subtitle, .instructions, #controls-tip {
                display: none !important;
            }
            #game-wrapper {
                flex-direction: row !important; /* Forces side-by-side arrangement */
                justify-content: center;
                align-items: center;
                gap: 20px;
                height: 95dvh;
                padding: 0 15px;
            }
            /* Rearrange with explicitly assigned display ordering */
            #left-controls {
                flex-direction: column !important;
                width: auto !important;
                order: 1 !important;
            }
            #game-container {
                width: auto !important;
                max-height: 92vh !important;
                order: 2 !important;
            }
            canvas {
                width: auto !important;
                height: 88vh !important; /* Dynamically lock frame constraints against mobile bounds */
                max-width: 68vw !important;
            }
            #right-controls {
                flex-direction: column !important;
                width: auto !important;
                order: 3 !important;
                gap: 10px;
            }
            /* Compact input components slightly for tighter visual optimization */
            .touch-button {
                width: 58px;
                height: 58px;
                font-size: 11px;
            }
            #joystick-container {
                width: 78px;
                height: 78px;
            }
            #joystick-knob {
                width: 28px;
                height: 28px;
                margin-left: -14px;
                margin-top: -14px;
            }
        }
    </style>
</head>
<body>
    <h1>Fighter Jet • MULTI-TARGET INTERCEPTOR V1.2</h1>
    <div class="subtitle">MULTI-TARGET INTERCEPTOR • TACTICAL SIMULATION • 1974 ERA</div>

    <div id="game-wrapper">
        <div id="left-controls">
            <div id="lock-button" class="touch-button">LOCK</div>
        </div>

        <div id="game-container">
            <div id="ui-overlay">
                <div class="ui-box" id="mode-display">WPN SYS: Missile</div>
                <div class="ui-box" id="target-display">Missile COUPLING: 0 / 6</div>
            </div>
            <div id="integrity-bar"><div id="integrity-fill" style="width: 100%"></div></div>
            <canvas id="simCanvas" width="800" height="520" tabindex="0"></canvas>
        </div>

        <div id="right-controls">
            <div id="fire-button" class="touch-button fire">FIRE</div>
            <div id="joystick-container">
                <div id="joystick-base"></div>
                <div id="joystick-knob"></div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <strong>MISSION:</strong> Lock all 6 Targets and then Launch Salvo.
    </div>

    <div id="controls-tip">
        <span class="accent">STEER:</span> Arrow Keys / Joystick &nbsp;•&nbsp;
        <span class="accent">LOCK:</span> SPACE / Left Button &nbsp;•&nbsp;
        <span class="highlight">FIRE:</span> ENTER / Right Button
    </div>

<script>
// ==================== ENGINE ARCHITECTURE ====================
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', { alpha: true });
const modeDisplay = document.getElementById('mode-display');
const targetDisplay = document.getElementById('target-display');
const integrityFill = document.getElementById('integrity-fill');

const HUD_SHIFT_Y = 49;
const RETICLE_CENTER_Y = 195 + HUD_SHIFT_Y;
const PITCH_MULTIPLIER = 0.95;
const DETECT_TOLERANCE = 35; 
const centerX = 400;
const centerY = 195;

let gameState = 'COCKPIT';
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

let plane = {
    roll: 0,
    pitch: 0,
    driftX: 0,
    maxRoll: 0.28,
    maxPitch: 175
};

let targets = [];
let missiles = [];
const maxTargets = 6;

// ==================== SIMULATION OBJECT CLASSES ====================
class Target {
    constructor(id) {
        this.id = id;
        this.reset();
    }
    reset() {
        this.x = Math.random() * 400 + 200;
        this.y = Math.random() * 150 + 100;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 1;
        this.locked = false;
        this.isoX = (Math.random() - 0.5) * 300;
        this.isoY = canvas.height - 100;
    }
    update() {
        if (gameState === 'COCKPIT') {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 100 || this.x > 700) this.vx *= -1;
            if (this.y < 50 || this.y > 350) this.vy *= -1;
        }
    }
}

class Missile {
    constructor(startX, startY, target) {
        this.x = startX;
        this.y = startY;
        this.target = target;
        this.speed = 7;
        this.active = true;
    }
    update() {
        if (this.target) {
            let targetPos = gameState === 'COCKPIT' ? getTargetScreenPos(this.target) : {x: this.target.isoX + 400, y: 200};
            let dx = targetPos.x - this.x;
            let dy = targetPos.y - this.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 10) {
                this.active = false;
                this.target.reset();
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        } else {
            this.y -= this.speed;
            if (this.y < 0) this.active = false;
        }
    }
}

// Initialize System Targets
for (let i = 0; i < maxTargets; i++) {
    targets.push(new Target(i));
}

function getTargetScreenPos(target) {
    return {
        x: target.x + (plane.roll * 400),
        y: target.y + (plane.pitch * PITCH_MULTIPLIER)
    };
}

// ==================== INPUT ACTIONS ====================
function handleLock() {
    if (gameState !== 'COCKPIT') return;
    let closestDist = Infinity;
    let closestTarget = null;

    targets.forEach(target => {
        if (target.locked) return;
        let pos = getTargetScreenPos(target);
        let dx = pos.x - centerX;
        let dy = pos.y - RETICLE_CENTER_Y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < DETECT_TOLERANCE && dist < closestDist) {
            closestDist = dist;
            closestTarget = target;
        }
    });
    if (closestTarget) {
        closestTarget.locked = true;
        updateUI();
    }
}

function handleFire() {
    let lockedTargets = targets.filter(t => t.locked);
    gameState = (gameState === 'COCKPIT') ? 'ISOMETRIC' : 'COCKPIT';
    modeDisplay.innerText = gameState === 'COCKPIT' ? "WPN SYS: Missile" : "MODE: TACTICAL MAP";

    if (lockedTargets.length === 0) {
        for (let i = 0; i < 6; i++) {
            missiles.push(new Missile(100 + (i * 110), canvas.height - 10, targets[i % targets.length]));
        }
    } else {
        lockedTargets.forEach((target, index) => {
            missiles.push(new Missile(100 + (index * 110), canvas.height - 10, target));
        });
    }
    updateUI();
}

function updateUI() {
    let count = targets.filter(t => t.locked).length;
    targetDisplay.innerText = `Missile COUPLING: ${count} / 6`;
}

// Global Touch Handlers
const lockButton = document.getElementById('lock-button');
const fireButton = document.getElementById('fire-button');

lockButton.addEventListener('touchstart', (e) => { e.preventDefault(); handleLock(); }, { passive: false });
fireButton.addEventListener('touchstart', (e) => { e.preventDefault(); handleFire(); }, { passive: false });
lockButton.addEventListener('click', (e) => { e.preventDefault(); handleLock(); });
fireButton.addEventListener('click', (e) => { e.preventDefault(); handleFire(); });

// ==================== DYNAMIC JOYSTICK LOGIC ====================
const joystickContainer = document.getElementById('joystick-container');
const joystickKnob = document.getElementById('joystick-knob');
let joystickActive = false;

function updateJoystick(clientX, clientY) {
    if (!joystickContainer || !joystickKnob) return;
    const rect = joystickContainer.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    let dx = clientX - cx;
    let dy = clientY - cy;
    
    // Scale tracking distance dynamically depending on the layout dimensions
    const maxDistance = rect.width / 2 - 10;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance > maxDistance) {
        dx = (dx / distance) * maxDistance;
        dy = (dy / distance) * maxDistance;
    }
    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

    plane.pitch += dy * 0.05;
    plane.roll += dx * 0.0005;
}

function resetJoystick() {
    if (joystickKnob) joystickKnob.style.transform = `translate(0px, 0px)`;
    joystickActive = false;
}

joystickContainer.addEventListener('touchstart', (e) => {
    e.preventDefault();
    joystickActive = true;
    updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (joystickActive) {
        e.preventDefault();
        updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

window.addEventListener('touchend', resetJoystick);

// Mouse fallbacks
joystickContainer.addEventListener('mousedown', (e) => { joystickActive = true; updateJoystick(e.clientX, e.clientY); });
window.addEventListener('mousemove', (e) => { if (joystickActive) updateJoystick(e.clientX, e.clientY); });
window.addEventListener('mouseup', resetJoystick);

// Keyboard bindings
window.addEventListener('keydown', (e) => {
    if(e.code === 'Space') handleLock();
    if(e.code === 'Enter') handleFire();
    if(e.key in keys) keys[e.key] = true;
});
window.addEventListener('keyup', (e) => {
    if(e.key in keys) keys[e.key] = false;
});

// ==================== GAME ENGINE LOOP ====================
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Coordinate adjustments
    if (keys.ArrowUp) plane.pitch -= 2;
    if (keys.ArrowDown) plane.pitch += 2;
    if (keys.ArrowLeft) plane.roll -= 0.005;
    if (keys.ArrowRight) plane.roll += 0.005;

    // Simulation Engine Graphics
    if (gameState === 'COCKPIT') {
        // Horizon Rendering Line
        ctx.strokeStyle = '#122334';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, centerY + plane.pitch);
        ctx.lineTo(canvas.width, centerY + plane.pitch);
        ctx.stroke();

        // Target Radar Rings
        ctx.strokeStyle = '#00ff9d';
        ctx.beginPath();
        ctx.arc(centerX, RETICLE_CENTER_Y, DETECT_TOLERANCE, 0, Math.PI * 2);
        ctx.stroke();

        targets.forEach(t => {
            t.update();
            let pos = getTargetScreenPos(t);
            ctx.strokeStyle = t.locked ? '#ff4d4d' : '#00ff9d';
            ctx.strokeRect(pos.x - 10, pos.y - 10, 20, 20);
            if (t.locked) {
                ctx.fillStyle = '#ff4d4d';
                ctx.font = '9px monospace';
                ctx.fillText("TRK LOCK", pos.x - 20, pos.y - 14);
            }
        });
    } else {
        // Isometric / Tactical Map View Mode
        ctx.strokeStyle = '#1a2638';
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        targets.forEach(t => {
            ctx.fillStyle = '#00ff9d';
            ctx.fillRect(t.isoX + 400, 200, 12, 12);
        });
    }

    // Process Missiles Status
    missiles = missiles.filter(m => m.active);
    missiles.forEach(m => {
        m.update();
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(m.x, m.y, 4, 10);
    });

    requestAnimationFrame(loop);
}

// Boot Engine Execution
loop();
</script>
</body>
</html>
