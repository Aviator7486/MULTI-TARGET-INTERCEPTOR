<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fighter Jet • Missile Intercept Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            background: #05070f;
            color: #fff;
            font-family: 'Segoe UI', system_ui, sans-serif;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin: 4px 0 2px;
            font-size: 17px;
            letter-spacing: 2px;
            color: #00ff9d;
        }

        .subtitle {
            font-size: 10px;
            color: #5a6b7c;
            margin-bottom: 6px;
        }

        #game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 100vw;
            padding: 0 4px;
            box-sizing: border-box;
        }

        #left-controls, #right-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 78px;
            flex-shrink: 0;
        }

        .touch-button {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.12);
            border: 2.5px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .touch-button:active {
            background: rgba(0, 255, 157, 0.45);
            color: white;
        }

        .touch-button.fire {
            background: rgba(255, 77, 77, 0.18);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        #joystick-container {
            position: relative;
            width: 88px;
            height: 88px;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.08);
            border: 2.5px solid #00ff9d;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 34px;
            height: 34px;
            margin-left: -17px;
            margin-top: -17px;
            border-radius: 50%;
            background: #00ff9d;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.6);
            transition: transform 0.05s;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.1);
            border: 2px solid #1a2638;
            border-radius: 4px;
            max-width: 100%;
        }

        canvas {
            background: #050811;
            display: block;
            border-radius: 2px;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            font-size: 10px;
        }

        .ui-box {
            background: rgba(5, 8, 17, 0.9);
            padding: 3px 8px;
            border: 1px solid #00ff9d;
            border-radius: 2px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
        }

        #integrity-bar {
            position: absolute;
            top: 38px;
            left: 6px;
            width: 88px;
            height: 10px;
            background: #1a2638;
            border: 1px solid #00ff9d;
            border-radius: 2px;
            overflow: hidden;
            z-index: 20;
        }

        #integrity-fill {
            height: 100%;
            background: linear-gradient(to right, #ff4d4d, #ffaa00);
        }

        #controls-tip {
            margin-top: 5px;
            text-align: center;
            color: #7a8a9e;
            font-size: 10.5px;
            max-width: 95vw;
        }

        .instructions {
            font-size: 10px;
            background: #0a0f1a;
            border: 1px solid #22334a;
            padding: 5px 10px;
            border-radius: 3px;
            margin: 4px 0;
            color: #8fa0b5;
            max-width: 95vw;
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            #game-wrapper {
                flex-direction: column;
                gap: 4px;
            }
            #left-controls, #right-controls {
                display: none;
            }
            canvas {
                max-height: 78dvh;
            }
        }
    </style>
</head>
<body>
    <h1>Fighter Jet • MULTI-TARGET INTERCEPTOR</h1>
    <div class="subtitle">MULTI-TARGET INTERCEPTOR • TACTICAL SIMULATION • 1974 ERA</div>

    <div id="game-wrapper">
        <div id="left-controls">
            <div id="lock-button" class="touch-button">LOCK</div>
        </div>

        <div id="game-container">
            <div id="ui-overlay">
                <div class="ui-box" id="mode-display">WPN SYS: Missile</div>
                <div class="ui-box" id="target-display">Missile COUPLING: 0 / 6</div>
            </div>
            <div id="integrity-bar"><div id="integrity-fill" style="width: 100%"></div></div>
            <canvas id="simCanvas" width="800" height="520" tabindex="0"></canvas>
        </div>

        <div id="right-controls">
            <div id="fire-button" class="touch-button fire">FIRE</div>
            <div id="joystick-container">
                <div id="joystick-base"></div>
                <div id="joystick-knob"></div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <strong>MISSION:</strong> Lock all 6 Targets and then Launch Salvo.
    </div>

    <div id="controls-tip">
        <span class="accent">STEER:</span> Arrows / Right Joystick &nbsp;•&nbsp;
        <span class="accent">LOCK:</span> SPACE / Left Button &nbsp;•&nbsp;
        <span class="highlight">FIRE:</span> ENTER / Right Button
    </div>

<script>
// ==================== COMPLETE WORKING GAME ====================

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', { alpha: true });
const modeDisplay = document.getElementById('mode-display');
const targetDisplay = document.getElementById('target-display');
const integrityFill = document.getElementById('integrity-fill');

const HUD_SHIFT_Y = 49;
const RETICLE_CENTER_Y = 195 + HUD_SHIFT_Y;
const PITCH_MULTIPLIER = 0.95;
const DETECT_TOLERANCE = 24;
const HUD_HALF_WIDTH = 99.75 * 0.98;
const HUD_TOP = -105 - (195 * 0.05);
const HUD_BOTTOM = 90;
const HUD_HEIGHT = Math.abs(HUD_TOP) + HUD_BOTTOM;

const cockpitImg = new Image();
let imgLoaded = false;
cockpitImg.onload = () => { imgLoaded = true; };

let gameState = 'COCKPIT';
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
const centerX = 400;
const centerY = 195;

let plane = {
    roll: 0,
    pitch: 0,
    driftX: 0,
    maxRoll: 0.28,
    maxPitch: 175,
    maxDrift: 320
};

let targets = [];
let missiles = [];
let incomingMissiles = [];
let particles = [];
const maxTargets = 6;
let waterScroll = 0;
let integrity = 3;
let lastAcridHitTime = 0;

let playerPlane = {
    isoX: -120,
    isoY: -120,
    isoZ: 260,
    spinAngle: 0,
    status: 'HIT',
    fallSpeed: 2.1
};

// ==================== TOUCH CONTROLS ====================
const lockButton = document.getElementById('lock-button');
const fireButton = document.getElementById('fire-button');
const joystickContainer = document.getElementById('joystick-container');
const joystickKnob = document.getElementById('joystick-knob');

let joystickActive = false;

function handleLock() {
    if (gameState !== 'COCKPIT') return;
    let closestDist = Infinity;
    let closestTarget = null;

    targets.forEach(target => {
        if (target.locked) return;
        let pos = getTargetScreenPos(target);
        let dx = pos.x - centerX;
        let dy = pos.y - RETICLE_CENTER_Y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < DETECT_TOLERANCE && dist < closestDist) {
            closestDist = dist;
            closestTarget = target;
        }
    });
    if (closestTarget) {
        closestTarget.locked = true;
        updateUI();
    }
}

if (lockButton) {
    lockButton.addEventListener('click', handleLock);
    lockButton.addEventListener('touchstart', e => { e.preventDefault(); handleLock(); });
}

function handleFire() {
    if (gameState !== 'COCKPIT') return;
    let lockedTargets = targets.filter(t => t.locked);
    gameState = 'ISOMETRIC';
    modeDisplay.innerText = "MODE: TACTICAL ISOMETRIC MAP";

    if (lockedTargets.length === 0) {
        for (let i = 0; i < 6; i++) missiles.push(new Missile(55 + (i * 110), canvas.height - 5, null));
    } else {
        lockedTargets.forEach((target, index) => {
            missiles.push(new Missile(55 + (index * 110), canvas.height - 5, target));
        });
    }
    updateUI();
}

if (fireButton) {
    fireButton.addEventListener('click', handleFire);
    fireButton.addEventListener('touchstart', e => { e.preventDefault(); handleFire(); });
}

function updateJoystick(clientX, clientY) {
    if (!joystickContainer || !joystickKnob) return;
    const rect = joystickContainer.getBoundingClientRect();
    let dx = clientX - (rect.left + rect.width / 2);
    let dy = clientY - (rect.top + rect.height / 2);

    const maxDistance = 48;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance > maxDistance) {
        const angle = Math.atan2(dy, dx);
        dx = Math.cos(angle) * maxDistance;
        dy = Math.sin(angle) * maxDistance;
    }
    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

    const sensitivity = 0.0048;
    plane.pitch = Math.max(-plane.maxPitch, Math.min(plane.maxPitch, plane.pitch + (dy * sensitivity)));
    plane.roll = Math.max(-plane.maxRoll, Math.min(plane.maxRoll, plane.roll + (dx * sensitivity * 0.85)));
}

function resetJoystick() {
    if (joystickKnob) joystickKnob.style.transform = `translate(0px, 0px)`;
    joystickActive = false;
}

if (joystickContainer) {
    joystickContainer.addEventListener('mousedown', e => { joystickActive = true; updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mousemove', e => { if (joystickActive) updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mouseup', resetJoystick);

    joystickContainer.addEventListener('touchstart', e => {
        e.preventDefault();
        joystickActive = true;
        updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    joystickContainer.addEventListener('touchmove', e => {
        e.preventDefault();
        if (joystickActive) updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    joystickContainer.addEventListener('touchend', e => {
        e.preventDefault();
        resetJoystick();
    });
}

// ==================== GAME CLASSES ====================
class Target {
    constructor(id) { this.id = id; this.reset(); }
    reset() {
        this.x = Math.random() * 420 + 190;
        this.y = Math.random() * 195 + 68;
        this.vx = (Math.random() - 0.5) * 1.35;
        this.vy = (Math.random() - 0.5) * 0.75;
        this.size = 22;
        this.locked = false;
        this.isoX = (Math.random() - 0.5) * 200;
        this.isoY = (Math.random() - 0.5) * 200;
        this.isoZ = 285 + Math.random() * 35;
        this.status = 'ALIVE';
        this.spinAngle = Math.random() * Math.PI;
        this.fallSpeed = 1.9;
        this.range = 52 + Math.random() * 18;
        this.closureRate = 0.78 + Math.random() * 0.42;
        this.prevRange = this.range;
        this.acridFired = false;
    }
    update() {
        if (gameState === 'COCKPIT') {
            let reticleX = centerX + plane.driftX * 1.1;
            let reticleY = centerY + plane.pitch * PITCH_MULTIPLIER;
            let dx = this.x - reticleX;
            let dy = this.y - reticleY;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;

            const repelStrength = 0.014;
            this.vx += (dx / dist) * repelStrength;
            this.vy += (dy / dist) * repelStrength;
            this.vx *= 0.978;
            this.vy *= 0.978;

            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 175) { this.vx = Math.abs(this.vx) * 0.6; this.x = 177; }
            if (this.x > 625) { this.vx = -Math.abs(this.vx) * 0.6; this.x = 623; }
            if (this.y < 68)  { this.vy = Math.abs(this.vy) * 0.6; this.y = 70; }
            if (this.y > 335) { this.vy = -Math.abs(this.vy) * 0.6; this.y = 333; }

            this.range = Math.max(12, this.range - this.closureRate * 0.0167);

            if (this.range < 34 && !this.acridFired && this.status === 'ALIVE') {
                this.acridFired = true;
                incomingMissiles.push(new IncomingMissile(this.x, this.y));
            }
        }
    }
    drawCockpitRaw(isHot = false) {
        ctx.save();
        ctx.lineWidth = 1.8;
        ctx.strokeStyle = this.locked ? '#ff3333' : '#00ff9d';
        ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.beginPath();
        ctx.moveTo(this.x - 9, this.y); ctx.lineTo(this.x + 9, this.y);
        ctx.moveTo(this.x, this.y - 4); ctx.lineTo(this.x, this.y + 4);
        ctx.stroke();
        ctx.restore();
    }
    drawIsometric() {
        let pos = toIso(this.isoX, this.isoY, this.isoZ);
        ctx.fillStyle = this.status === 'ALIVE' ? '#5a6b7c' : '#e67e22';
        ctx.fillRect(pos.x - 8, pos.y - 8, 16, 16);
    }
}

class IncomingMissile {
    constructor(startX, startY) {
        this.worldX = startX;
        this.worldY = startY;
        this.distance = 100;
        this.active = true;
    }
    update() {
        this.distance -= 1.15;
        if (this.distance <= 0) {
            this.active = false;
            integrity = Math.max(0, integrity - 1);
            integrityFill.style.width = (integrity / 3 * 100) + '%';
            if (integrity <= 0) gameState = 'PLAYER_CRASH';
        }
    }
    draw() {
        let screenPos = getIncomingScreenPos(this);
        ctx.fillStyle = '#ff4500';
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, 6, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Missile {
    constructor(startX, startY, target) {
        this.x = startX;
        this.y = startY;
        this.target = target;
        this.speed = 6.8;
        this.active = true;
    }
    update() {
        if (!this.active) return;
        if (this.target) {
            let pos = toIso(this.target.isoX, this.target.isoY, this.target.isoZ);
            let dx = pos.x - this.x;
            let dy = pos.y - this.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
            if (dist < 12) this.active = false;
        } else {
            this.y -= this.speed;
            if (this.y < -30) this.active = false;
        }
    }
    draw() {
        if (!this.active) return;
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Particle {
    constructor(x, y, color, size = 3) {
        this.x = x; this.y = y; this.color = color; this.size = size;
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = (Math.random() - 0.5) * 3 - 1;
        this.alpha = 1; this.life = 30;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 1 / this.life; }
    draw() {
        if (this.alpha <= 0) return;
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

// ==================== HELPER FUNCTIONS ====================
function getIncomingScreenPos(m) {
    let x1 = m.worldX + plane.driftX * 1.1;
    let y1 = m.worldY + plane.pitch * PITCH_MULTIPLIER + HUD_SHIFT_Y;
    let dx = x1 - centerX;
    let dy = y1 - centerY;
    let angle = -plane.roll * 0.85;
    return {
        x: centerX + dx * Math.cos(angle) - dy * Math.sin(angle),
        y: centerY + dx * Math.sin(angle) + dy * Math.cos(angle)
    };
}

function getTargetScreenPos(target) {
    let x1 = target.x + plane.driftX * 1.1;
    let y1 = target.y + plane.pitch * PITCH_MULTIPLIER + HUD_SHIFT_Y;
    let dx = x1 - centerX;
    let dy = y1 - centerY;
    let angle = -plane.roll * 0.85;
    return {
        x: centerX + dx * Math.cos(angle) - dy * Math.sin(angle),
        y: centerY + dx * Math.sin(angle) + dy * Math.cos(angle)
    };
}

function toIso(x, y, z) {
    return {
        x: 400 + (x - y) * 0.866,
        y: 375 + (x + y) * 0.5 - z
    };
}

function updateUI() {
    let lockedCount = targets.filter(t => t.locked).length;
    targetDisplay.innerText = `Missile COUPLING: ${lockedCount} / ${maxTargets}`;
}

function updatePlanePhysics() {
    const rollSpeed = 0.031;
    const pitchSpeed = 4.55;
    const driftSpeed = 6.45;
    const friction = 0.993;

    if (keys.ArrowLeft) {
        plane.roll = Math.max(plane.roll - rollSpeed, -plane.maxRoll);
        plane.driftX = Math.min(plane.driftX + driftSpeed, plane.maxDrift);
    } else if (keys.ArrowRight) {
        plane.roll = Math.min(plane.roll + rollSpeed, plane.maxRoll);
        plane.driftX = Math.max(plane.driftX - driftSpeed, -plane.maxDrift);
    } else {
        plane.roll *= friction;
        plane.driftX *= friction;
    }

    if (keys.ArrowUp) {
        plane.pitch = Math.max(plane.pitch - pitchSpeed, -plane.maxPitch);
    } else if (keys.ArrowDown) {
        plane.pitch = Math.min(plane.pitch + pitchSpeed, plane.maxPitch);
    } else {
        plane.pitch *= friction;
    }
}

function drawMovingBackground() {
    ctx.fillStyle = '#0a1429';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0b2538';
    ctx.fillRect(0, 193, canvas.width, canvas.height - 193);
}

function drawCockpitView() {
    drawMovingBackground();
    if (imgLoaded) {
        ctx.drawImage(cockpitImg, 0, 0, canvas.width, canvas.height);
    }
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(-plane.roll * 0.85);
    ctx.translate(-centerX, -centerY);
    ctx.translate(plane.driftX * 1.1, plane.pitch * PITCH_MULTIPLIER + HUD_SHIFT_Y);

    targets.forEach(t => {
        let pos = getTargetScreenPos(t);
        const isInHud = pos.x > centerX - HUD_HALF_WIDTH && pos.x < centerX + HUD_HALF_WIDTH &&
                        pos.y > centerY + HUD_TOP + HUD_SHIFT_Y && pos.y < centerY + HUD_BOTTOM + HUD_SHIFT_Y;
        if (isInHud) t.drawCockpitRaw();
    });
    ctx.restore();
}

function drawIsometricGrid() {
    ctx.fillStyle = '#050a12';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'COCKPIT') {
        updatePlanePhysics();
        targets.forEach(t => t.update());
        incomingMissiles = incomingMissiles.filter(m => {
            m.update();
            return m.active;
        });
        drawCockpitView();
        incomingMissiles.forEach(m => m.draw());
    } else if (gameState === 'ISOMETRIC') {
        drawIsometricGrid();
        targets.forEach(t => t.drawIsometric());
        missiles.forEach(m => { m.update(); m.draw(); });
    } else if (gameState === 'PLAYER_CRASH') {
        drawIsometricGrid();
        ctx.fillStyle = '#ff4d4d';
        ctx.font = '14px Share Tech Mono, monospace';
        ctx.fillText("HUD COMPROMISED", 280, canvas.height - 40);
    }

    requestAnimationFrame(loop);
}

function init() {
    targets = [];
    missiles = [];
    incomingMissiles = [];
    particles = [];
    for (let i = 0; i < maxTargets; i++) targets.push(new Target(i));
    gameState = 'COCKPIT';
    integrity = 3;
    integrityFill.style.width = '100%';
    updateUI();
}

window.addEventListener('keydown', e => {
    if (e.key in keys) keys[e.key] = true;
    if (gameState === 'COCKPIT' && e.key === ' ') { e.preventDefault(); handleLock(); }
    if (e.key === 'Enter') { e.preventDefault(); handleFire(); }
});

window.addEventListener('keyup', e => {
    if (e.key in keys) keys[e.key] = false;
});

init();
loop();
</script>
</body>
</html>
