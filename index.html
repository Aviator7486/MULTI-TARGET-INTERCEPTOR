<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fighter Jet • Missile Intercept Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #05070f;
            color: #fff;
            font-family: 'Segoe UI', system_ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 8px 0 2px;
            font-size: 18px;
            letter-spacing: 2px;
            color: #00ff9d;
        }

        .subtitle {
            font-size: 10px;
            color: #5a6b7c;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        #game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
            width: 100%;
            max-width: 100vw;
        }

        #left-controls, #right-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 90px;
        }

        .touch-button {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.15);
            border: 2.5px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            z-index: 100;
        }

        .touch-button:active {
            background: rgba(0, 255, 157, 0.45);
            color: white;
        }

        .touch-button.fire {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .touch-button.fire:active {
            background: rgba(255, 77, 77, 0.55);
        }

        #joystick-container {
            position: relative;
            width: 100px;
            height: 100px;
            touch-action: none;
            z-index: 100;
        }

        #joystick-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.1);
            border: 2.5px solid #00ff9d;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 38px;
            height: 38px;
            margin-left: -19px;
            margin-top: -19px;
            border-radius: 50%;
            background: #00ff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.6);
            transition: transform 0.05s;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.12);
            border: 2px solid #1a2638;
            border-radius: 4px;
            max-width: 100%;
            width: fit-content;
        }

        canvas {
            background: #050811;
            display: block;
            border-radius: 2px;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
        }

        #ui-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            font-size: 11px;
        }

        .ui-box {
            background: rgba(5, 8, 17, 0.92);
            padding: 4px 10px;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        #integrity-bar {
            position: absolute;
            top: 42px;
            left: 8px;
            width: 95px;
            height: 11px;
            background: #1a2638;
            border: 1px solid #00ff9d;
            border-radius: 2px;
            overflow: hidden;
            z-index: 20;
        }

        #integrity-fill {
            height: 100%;
            background: linear-gradient(to right, #ff4d4d, #ffaa00);
            transition: width 0.2s ease;
        }

        #controls-tip {
            margin-top: 8px;
            text-align: center;
            color: #7a8a9e;
            font-size: 11px;
            max-width: 95vw;
            padding: 0 10px;
        }

        .instructions {
            font-size: 10px;
            background: #0a0f1a;
            border: 1px solid #22334a;
            padding: 6px 10px;
            border-radius: 4px;
            margin: 6px 0;
            color: #8fa0b5;
            max-width: 95vw;
        }

        /* Landscape optimization for phones */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            #game-wrapper {
                gap: 8px;
            }
            .touch-button {
                width: 68px;
                height: 68px;
                font-size: 13px;
            }
            #joystick-container {
                width: 85px;
                height: 85px;
            }
            #joystick-base, #joystick-knob {
                width: 85px;
                height: 85px;
            }
        }
    </style>
</head>
<body>
    <h1>Fighter Jet • MULTI-TARGET INTERCEPTOR</h1>
    <div class="subtitle">MULTI-TARGET INTERCEPTOR • TACTICAL SIMULATION • 1974 ERA</div>

    <div id="game-wrapper">
        <!-- LEFT CONTROLS -->
        <div id="left-controls">
            <div id="lock-button" class="touch-button">LOCK</div>
        </div>

        <!-- GAME -->
        <div id="game-container">
            <div id="ui-overlay">
                <div class="ui-box" id="mode-display">WPN SYS: Missile</div>
                <div class="ui-box" id="target-display">Missile COUPLING: 0 / 6</div>
            </div>
            <div id="integrity-bar"><div id="integrity-fill" style="width: 100%"></div></div>
            <canvas id="simCanvas" width="800" height="520" tabindex="0"></canvas>
        </div>

        <!-- RIGHT CONTROLS -->
        <div id="right-controls">
            <div id="fire-button" class="touch-button fire">FIRE</div>
            <div id="joystick-container">
                <div id="joystick-base"></div>
                <div id="joystick-knob"></div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <strong>MISSION:</strong> Lock all 6 Targets and then Launch Salvo.
    </div>

    <div id="controls-tip">
        <span class="accent">STEER:</span> Arrows or Right Joystick &nbsp;•&nbsp;
        <span class="accent">LOCK:</span> SPACE or Left Button &nbsp;•&nbsp;
        <span class="highlight">FIRE:</span> ENTER or Right Button
    </div>

<script>

</script>
</body>
</html>
