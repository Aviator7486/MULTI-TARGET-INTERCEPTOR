    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;

            align-items: center;

        .touch-button:active {
            background: rgba(0, 255, 157, 0.45);
            color: white;
        }

        .touch-button.fire {
            background: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .touch-button.fire:active {
            background: rgba(255, 77, 77, 0.55);
        }

        #joystick-container {
            position: relative;
            width: 95px;
            height: 95px;
            touch-action: none;
            z-index: 100;
        }

        #joystick-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.1);
            border: 2.5px solid #00ff9d;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 36px;
            height: 36px;
            margin-left: -18px;
            margin-top: -18px;
            border-radius: 50%;
            background: #00ff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.6);
            transition: transform 0.05s;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.12);
            border: 2px solid #1a2638;
            border-radius: 4px;
            max-width: 100%;
        }

        canvas {
            background: #050811;
            display: block;
            border-radius: 2px;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
        }

        #ui-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            font-size: 11px;
        }

        .ui-box {
            background: rgba(5, 8, 17, 0.92);
            padding: 4px 10px;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        #integrity-bar {
            position: absolute;
            top: 42px;
            left: 8px;
            width: 95px;
            height: 11px;
            background: #1a2638;
            border: 1px solid #00ff9d;
            border-radius: 2px;
            overflow: hidden;
            z-index: 20;
        }

        #integrity-fill {
            height: 100%;
            background: linear-gradient(to right, #ff4d4d, #ffaa00);
            transition: width 0.2s ease;
        }

        #controls-tip {
            margin-top: 6px;
            text-align: center;
            color: #7a8a9e;
            font-size: 11px;
            max-width: 95vw;
            padding: 0 10px;
        }

        .instructions {
            font-size: 10px;
            background: #0a0f1a;
            border: 1px solid #22334a;
            padding: 5px 10px;
            border-radius: 4px;
            margin: 5px 0;
            color: #8fa0b5;
            max-width: 95vw;
        }

        /* ========== LANDSCAPE MODE ON PHONES ========== */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            #game-wrapper {
                flex-direction: column;
                gap: 6px;
            }
            
            #left-controls, #right-controls {
                display: none; /* Hide side controls in landscape to give game more space */
            }
            
            canvas {
                max-height: 82vh;
                width: auto !important;
            }
            
            #controls-tip {
                font-size: 10px;
                margin-top: 2px;
            }
        }
    </style>
</head>

const HUD_HALF_WIDTH = 99.75 * 0.98;
const HUD_TOP = -105 - (195 * 0.05);
const HUD_BOTTOM = 90;
const HUD_HEIGHT = Math.abs(HUD_TOP) + HUD_BOTTOM;

cockpitImg.onload = () => { imgLoaded = true; };

// ==================== TOUCH CONTROLS ====================
const lockButton = document.getElementById('lock-button');
const fireButton = document.getElementById('fire-button');
const joystickContainer = document.getElementById('joystick-container');
const joystickKnob = document.getElementById('joystick-knob');

let joystickActive = false;

function handleLock() {
    if (gameState !== 'COCKPIT') return;
    let closestDist = Infinity;
    let closestTarget = null;

    targets.forEach(target => {
        if (target.locked) return;
        let pos = getTargetScreenPos(target);
        let dx = pos.x - centerX;
        let dy = pos.y - RETICLE_CENTER_Y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < DETECT_TOLERANCE && dist < closestDist) {
            closestDist = dist;
            closestTarget = target;
        }
    });
    if (closestTarget) {
        closestTarget.locked = true;
        updateUI();
    }
}

if (lockButton) {
    lockButton.addEventListener('click', handleLock);
    lockButton.addEventListener('touchstart', (e) => { e.preventDefault(); handleLock(); });
}

function handleFire() {
    if (gameState !== 'COCKPIT') return;
    let lockedTargets = targets.filter(t => t.locked);
    gameState = 'ISOMETRIC';
    modeDisplay.innerText = "MODE: TACTICAL ISOMETRIC MAP";

    if (lockedTargets.length === 0) {
        for (let i = 0; i < 6; i++) {
            missiles.push(new Missile(55 + (i * 110), canvas.height - 5, null));
        }
    } else {
        lockedTargets.forEach((target, index) => {
            missiles.push(new Missile(55 + (index * 110), canvas.height - 5, target));
        });
    }
    updateUI();
}

if (fireButton) {
    fireButton.addEventListener('click', handleFire);
    fireButton.addEventListener('touchstart', (e) => { e.preventDefault(); handleFire(); });
}

function updateJoystick(clientX, clientY) {
    if (!joystickContainer || !joystickKnob) return;
    const rect = joystickContainer.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    let dx = clientX - cx;
    let dy = clientY - cy;

    const maxDistance = 50;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance > maxDistance) {
        const angle = Math.atan2(dy, dx);
        dx = Math.cos(angle) * maxDistance;
        dy = Math.sin(angle) * maxDistance;
    }
    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

    const sensitivity = 0.0048;
    plane.pitch = Math.max(-plane.maxPitch, Math.min(plane.maxPitch, plane.pitch + (dy * sensitivity)));
    plane.roll = Math.max(-plane.maxRoll, Math.min(plane.maxRoll, plane.roll + (dx * sensitivity * 0.85)));
}

function resetJoystick() {
    if (joystickKnob) joystickKnob.style.transform = `translate(0px, 0px)`;
    joystickActive = false;
}

if (joystickContainer) {
    joystickContainer.addEventListener('mousedown', (e) => { joystickActive = true; updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mousemove', (e) => { if (joystickActive) updateJoystick(e.clientX, e.clientY); });
    window.addEventListener('mouseup', resetJoystick);

    joystickContainer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        joystickActive = true;
        updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    joystickContainer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (joystickActive) updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    joystickContainer.addEventListener('touchend', (e) => {
        e.preventDefault();
        resetJoystick();
    });
}
